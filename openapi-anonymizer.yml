openapi: 3.0.3
info:
  title: Presidio Anonymizer API
  description: >
    Anonymizes PII entities detected by the Presidio Analyzer. Supports
    multiple anonymization operators including replace, mask, hash, encrypt,
    redact, and custom operators. Part of the Microsoft Presidio framework.
  version: 2.x
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: Microsoft Presidio
    url: https://github.com/microsoft/presidio

servers:
  - url: http://localhost:5001
    description: Local / Codespaces

tags:
  - name: Anonymization
    description: Anonymize and de-anonymize PII in text
  - name: Operators
    description: Query supported anonymization operators

paths:

  /health:
    get:
      operationId: getHealth
      tags: [Anonymization]
      summary: Health check
      description: Returns the health status of the Anonymizer service.
      responses:
        '200':
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /anonymize:
    post:
      operationId: anonymizeText
      tags: [Anonymization]
      summary: Anonymize PII in text
      description: >
        Anonymizes PII entities in text using the results from the Presidio
        Analyzer. Accepts a list of analyzer results and applies the specified
        anonymization operator to each entity type.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnonymizeRequest'
            examples:
              replace:
                summary: Replace with entity type label
                value:
                  text: "Hi, I'm John Smith. My email is john@example.com."
                  anonymizers:
                    DEFAULT:
                      type: replace
                  analyzer_results:
                    - start: 8
                      end: 18
                      score: 0.85
                      entity_type: PERSON
                    - start: 32
                      end: 48
                      score: 1.0
                      entity_type: EMAIL_ADDRESS
              mask:
                summary: Mask last 4 characters
                value:
                  text: "John's SSN is 078-05-1120."
                  anonymizers:
                    DEFAULT:
                      type: mask
                      masking_char: "*"
                      chars_to_mask: 4
                      from_end: true
                  analyzer_results:
                    - start: 0
                      end: 4
                      score: 0.85
                      entity_type: PERSON
                    - start: 14
                      end: 25
                      score: 0.85
                      entity_type: US_SSN
              hash:
                summary: Hash with SHA-256
                value:
                  text: "Contact jane@example.com for details."
                  anonymizers:
                    EMAIL_ADDRESS:
                      type: hash
                      hash_type: sha256
                  analyzer_results:
                    - start: 8
                      end: 24
                      score: 1.0
                      entity_type: EMAIL_ADDRESS
              redact:
                summary: Redact (remove) entity
                value:
                  text: "Call me at 212-555-0199."
                  anonymizers:
                    DEFAULT:
                      type: redact
                  analyzer_results:
                    - start: 11
                      end: 23
                      score: 0.75
                      entity_type: PHONE_NUMBER
              encrypt:
                summary: Encrypt with AES
                value:
                  text: "My name is John Smith."
                  anonymizers:
                    PERSON:
                      type: encrypt
                      key: "WmZq4t7w!z%C&F)J"
                  analyzer_results:
                    - start: 11
                      end: 21
                      score: 0.85
                      entity_type: PERSON
      responses:
        '200':
          description: Anonymized text with details of each operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnonymizeResponse'
              example:
                text: "Hi, I'm <PERSON>. My email is <EMAIL_ADDRESS>."
                items:
                  - operator: replace
                    entity_type: PERSON
                    start: 8
                    end: 15
                    text: "<PERSON>"
                  - operator: replace
                    entity_type: EMAIL_ADDRESS
                    start: 30
                    end: 45
                    text: "<EMAIL_ADDRESS>"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /deanonymize:
    post:
      operationId: deanonymizeText
      tags: [Anonymization]
      summary: De-anonymize text
      description: >
        Reverses anonymization for entities that were anonymized using the
        encrypt operator. Requires the same encryption key used during
        anonymization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeanonymizeRequest'
            example:
              text: "My name is <encrypted_value_here>."
              deanonymizers:
                PERSON:
                  type: decrypt
                  key: "WmZq4t7w!z%C&F)J"
              anonymizer_results:
                - start: 11
                  end: 32
                  operator: encrypt
                  entity_type: PERSON
      responses:
        '200':
          description: De-anonymized text
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnonymizeResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /anonymizers:
    get:
      operationId: listAnonymizers
      tags: [Operators]
      summary: List supported anonymizer operators
      description: Returns all anonymization operator types supported by the service.
      responses:
        '200':
          description: List of supported operator names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example:
                - replace
                - redact
                - hash
                - mask
                - encrypt
                - custom

  /deanonymizers:
    get:
      operationId: listDeanonymizers
      tags: [Operators]
      summary: List supported de-anonymizer operators
      description: Returns all de-anonymization operator types supported by the service.
      responses:
        '200':
          description: List of supported de-anonymizer operator names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example:
                - decrypt

components:
  schemas:

    AnonymizeRequest:
      type: object
      required:
        - text
        - analyzer_results
      properties:
        text:
          type: string
          description: The original text containing PII to anonymize.
          example: "Hi, I'm John Smith. My email is john@example.com."
        anonymizers:
          type: object
          description: >
            Map of entity type (or DEFAULT) to anonymizer operator config.
            Use DEFAULT to apply an operator to all entity types not
            explicitly listed.
          additionalProperties:
            $ref: '#/components/schemas/AnonymizerConfig'
          example:
            DEFAULT:
              type: replace
            PHONE_NUMBER:
              type: mask
              masking_char: "*"
              chars_to_mask: 4
              from_end: true
        analyzer_results:
          type: array
          description: >
            List of PII detections returned by the Presidio Analyzer
            /analyze endpoint.
          items:
            $ref: '#/components/schemas/AnalyzerResult'

    AnonymizerConfig:
      type: object
      required:
        - type
      description: Configuration for a single anonymization operator.
      properties:
        type:
          type: string
          enum: [replace, redact, hash, mask, encrypt, custom]
          description: The anonymization operator to apply.
          example: replace
        new_value:
          type: string
          description: >
            (replace operator) The value to replace the PII with. If omitted,
            defaults to <ENTITY_TYPE>.
          example: ANONYMIZED
        masking_char:
          type: string
          description: (mask operator) The character to use for masking.
          example: "*"
        chars_to_mask:
          type: integer
          description: (mask operator) Number of characters to mask.
          example: 4
        from_end:
          type: boolean
          description: (mask operator) If true, mask from the end of the value.
          example: true
        hash_type:
          type: string
          enum: [md5, sha256, sha512]
          description: (hash operator) The hashing algorithm to use.
          example: sha256
        key:
          type: string
          description: >
            (encrypt/decrypt operator) AES encryption key. Must be 128, 192,
            or 256 bits (16, 24, or 32 characters).
          example: "WmZq4t7w!z%C&F)J"

    AnalyzerResult:
      type: object
      required:
        - start
        - end
        - score
        - entity_type
      description: A single PII detection result from the Presidio Analyzer.
      properties:
        start:
          type: integer
          description: Start character index of the entity in the text.
          example: 8
        end:
          type: integer
          description: End character index of the entity in the text.
          example: 18
        score:
          type: number
          format: float
          description: Confidence score between 0.0 and 1.0.
          example: 0.85
        entity_type:
          type: string
          description: The PII entity type.
          example: PERSON

    AnonymizeResponse:
      type: object
      properties:
        text:
          type: string
          description: The anonymized text.
          example: "Hi, I'm <PERSON>. My email is <EMAIL_ADDRESS>."
        items:
          type: array
          description: Details of each anonymization operation performed.
          items:
            $ref: '#/components/schemas/AnonymizeResultItem'

    AnonymizeResultItem:
      type: object
      properties:
        operator:
          type: string
          description: The operator that was applied.
          example: replace
        entity_type:
          type: string
          description: The PII entity type that was anonymized.
          example: PERSON
        start:
          type: integer
          description: Start index of the anonymized value in the output text.
          example: 8
        end:
          type: integer
          description: End index of the anonymized value in the output text.
          example: 15
        text:
          type: string
          description: The replacement text that was inserted.
          example: "<PERSON>"

    DeanonymizeRequest:
      type: object
      required:
        - text
        - anonymizer_results
      properties:
        text:
          type: string
          description: The anonymized text to de-anonymize.
        deanonymizers:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AnonymizerConfig'
        anonymizer_results:
          type: array
          items:
            $ref: '#/components/schemas/AnonymizeResultItem'

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Invalid request body"
