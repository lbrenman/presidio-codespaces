openapi: 3.0.3
info:
  title: Presidio Image Redactor API
  description: >
    Detects and redacts PII text entities in images using OCR (Optical
    Character Recognition) and the Presidio Analyzer engine. Supports
    standard image formats (PNG, JPEG, BMP, TIFF) and DICOM medical images.
    Part of the Microsoft Presidio framework.
  version: 2.x
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: Microsoft Presidio
    url: https://github.com/microsoft/presidio

servers:
  - url: http://localhost:5003
    description: Local / Codespaces

tags:
  - name: Redaction
    description: Redact PII from images

paths:

  /health:
    get:
      tags: [Redaction]
      summary: Health check
      description: Returns the health status of the Image Redactor service.
      responses:
        '200':
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /redact:
    post:
      tags: [Redaction]
      summary: Redact PII from a standard image
      description: >
        Accepts a standard image file (PNG, JPEG, BMP, TIFF) as multipart
        form data, detects PII text using OCR + the Presidio Analyzer, and
        returns a new image with PII regions blacked out (or filled with the
        specified color).


        The service uses Tesseract OCR to extract text from the image, passes
        it to the Presidio Analyzer to detect PII entities, then maps the
        detected entities back to bounding boxes in the image and fills them
        with the specified color.


        **Example curl:**
        ```bash
        curl -X POST http://localhost:5003/redact \
          -H "content-type: multipart/form-data" \
          -F "image=@photo.png" \
          -F "data=\"{'color_fill':'0'}\"" \
          --output redacted.png
        ```
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                  description: >
                    The image file to redact. Supported formats: PNG, JPEG,
                    BMP, TIFF.
                data:
                  type: string
                  description: >
                    JSON string containing redaction options. All fields are
                    optional.


                    Supported fields:

                    - `color_fill` (integer or array): Fill color for redacted
                    regions. Use a single integer (0–255) for grayscale or an
                    RGB array like `[0, 0, 0]` for black. Defaults to black
                    (0).

                    - `score_threshold` (float): Minimum analyzer confidence
                    score (0.0–1.0) for an entity to be redacted. Defaults to
                    0.35.

                    - `entities` (array of strings): Restrict redaction to
                    specific PII entity types only.

                    - `allow_list` (array of strings): Text values to exclude
                    from redaction even if detected as PII.
                  example: "{'color_fill': [255, 192, 203]}"
            encoding:
              data:
                contentType: application/json
      responses:
        '200':
          description: >
            The redacted image file. The response Content-Type matches the
            format of the uploaded image.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
        '400':
          description: Bad request — invalid image or malformed data field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error (e.g. OCR failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /redact-file:
    post:
      tags: [Redaction]
      summary: Redact PII from a DICOM image file
      description: >
        Accepts a DICOM (.dcm) medical image file, detects PII in the pixel
        data using OCR and Presidio Analyzer, and returns a redacted DICOM
        file.


        > ⚠️ This endpoint redacts **pixel data only**. It does not scrub PII
        from DICOM metadata/tags. Use a separate tool (e.g. Microsoft Tools
        for Health Data Anonymization) to scrub DICOM metadata.


        **Example curl:**
        ```bash
        curl -X POST http://localhost:5003/redact-file \
          -H "content-type: multipart/form-data" \
          -F "file=@scan.dcm" \
          -F "data=\"{'fill': 'contrast'}\"" \
          --output redacted.dcm
        ```
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: The DICOM (.dcm) file to redact.
                data:
                  type: string
                  description: >
                    JSON string containing DICOM redaction options. All fields
                    are optional.


                    Supported fields:

                    - `fill` (string): Fill mode for redacted regions. Either
                    `"contrast"` (inverse of background color) or
                    `"background"` (blend with background). Defaults to
                    `"contrast"`.

                    - `padding_width` (integer): Padding in pixels added
                    around detected bounding boxes before redaction. Defaults
                    to 25.

                    - `score_threshold` (float): Minimum confidence score for
                    a detected entity to be redacted. Defaults to 0.35.

                    - `entities` (array of strings): Restrict redaction to
                    specific PII entity types.

                    - `allow_list` (array of strings): Text values to exclude
                    from redaction.
                  example: "{'fill': 'contrast', 'padding_width': 25}"
      responses:
        '200':
          description: The redacted DICOM file.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Bad request — invalid file or malformed data field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Failed to process image: unsupported format"
